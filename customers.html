<!DOCTYPE html>
<html>
<head>
    <title>Customers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- 🔷 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html">Billing System</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="product.html">Products</a></li>
                <li class="nav-item"><a class="nav-link active" href="customer.html">Customers</a></li>
                <li class="nav-item"><a class="nav-link" href="billing.html">Billing</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h3 class="mb-4">Customer Management</h3>

    <!-- ADD / EDIT -->
    <div class="card p-4 mb-4 shadow-sm">
        <input type="hidden" id="customerId">

        <div class="row g-3">
            <div class="col-md-3">
                <input class="form-control" id="customerName" placeholder="Customer Name">
            </div>

            <div class="col-md-3">
                <input class="form-control" id="customerPhone" placeholder="Phone Number">
            </div>

            <div class="col-md-4">
                <input class="form-control" id="customerAddress" placeholder="Address">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="saveCustomer()">Save</button>
            </div>
        </div>
    </div>

    <!-- CUSTOMER LIST -->
    <div class="card p-3 shadow-sm">
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th width="150">Action</th>
                </tr>
            </thead>
            <tbody id="customerTable"></tbody>
        </table>
    </div>

</div>

<script>

let customers = [];

// 🔹 LOAD ON PAGE LOAD
function loadCustomers() {
    fetch("http://localhost:3000/customers")
    .then(res => res.json())
    .then(data => {
        customers = data;
        renderTable();
    });
}

function renderTable() {
    customerTable.innerHTML = "";
    customers.forEach(c => {
        customerTable.innerHTML += `
        <tr>
            <td>${c.name}</td>
            <td>${c.phone}</td>
            <td>${c.address || ''}</td>
            <td>
                <button class="btn btn-sm btn-warning" onclick="editCustomer(${c.id})">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteCustomer(${c.id})">Delete</button>
            </td>
        </tr>`;
    });
}

function saveCustomer() {

    const id = customerId.value;
    const name = customerName.value.trim();
    const phone = customerPhone.value.trim();
    const address = customerAddress.value.trim();

    if (!name || !phone) {
        alert("Name and Phone required");
        return;
    }

    const method = id ? "PUT" : "POST";
    const url = id 
        ? `http://localhost:3000/customers/${id}`
        : `http://localhost:3000/customers`;

    fetch(url, {
        method: method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, phone, address })
    })
    .then(res => res.json())
    .then(() => {
        resetForm();
        loadCustomers();
    });
}

function editCustomer(id) {
    const c = customers.find(x => x.id === id);
    customerId.value = c.id;
    customerName.value = c.name;
    customerPhone.value = c.phone;
    customerAddress.value = c.address;
}

function deleteCustomer(id) {
    if (!confirm("Delete this customer?")) return;

    fetch(`http://localhost:3000/customers/${id}`, {
        method: "DELETE"
    })
    .then(() => loadCustomers());
}

function resetForm() {
    customerId.value = "";
    customerName.value = "";
    customerPhone.value = "";
    customerAddress.value = "";
}

// 🔥 AUTO LOAD
window.onload = loadCustomers;

</script>

</body>
</html>
