<!DOCTYPE html>
<html>
<head>
    <title>Billing Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        .sidebar {
            height: 100vh;
            background: #343a40;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 15px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #495057;
        }

        .content {
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4 class="text-white text-center py-3">Billing System</h4>
            <a href="index.html">Dashboard</a>
            <a href="product.html">Products</a>
            <a href="billing.html">Billings</a>
            <a href="customers.html">Customers</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 content">

            <!-- Top Navbar -->
            <nav class="navbar navbar-light bg-light shadow-sm mb-4">
                <span class="navbar-brand mb-0 h4">Dashboard</span>
            </nav>

            <div class="row">
                <div class="col-md-4">
                    <div class="card shadow">
                        <div class="card-body">
                            <h5>Total Products</h5>
                            <h3 id="totalProducts">0</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow">
                        <div class="card-body">
                            <h5>Total Customers</h5>
                            <h3 id="totalCustomers">0</h3>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
function loadCounts() {
    fetch('http://localhost:3000/products')
    .then(res => res.json())
    .then(data => {
        document.getElementById("totalProducts").innerText = data.length;
    });
}

window.onload = loadCounts;
</script>

</body>
</html>
